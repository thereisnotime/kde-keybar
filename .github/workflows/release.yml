name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build packages and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install nfpm
        env:
          NFPM_VERSION: "2.47.0"
        run: |
          curl -sSfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb" -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb
          nfpm --version

      - name: Build .deb and .rpm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          nfpm package -f packaging/nfpm.yaml -p deb -t dist/
          nfpm package -f packaging/nfpm.yaml -p rpm -t dist/
          ls -l dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
