name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: input
    id: compositor
    attributes:
      label: Compositor / desktop
      description: Which compositor is this for (KWin, sway, Hyprland, GNOME, ...)?
  - type: textarea
    id: context
    attributes:
      label: Additional context
