name: Bug report
description: Something is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Fill in the versions and setup.
      value: |
        - kde-keybar version (`kde-keybar --version`):
        - Distro:
        - Compositor (KWin / sway / Hyprland / ...):
        - Plasma version (if KDE):
        - Python (`python3 --version`):
        - ydotool version:
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config
      description: Relevant parts of `~/.config/kde-keybar.json` (redact anything private).
      render: json
  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      description: Error output from running `GDK_BACKEND=wayland kde-keybar` in a terminal.
      render: shell
